name: Deploy Fog & Flour roadmap site

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "index.html"
      - "404.html"
      - "styles.css"
      - "app.js"
      - "roadmap.json"
      - "favicon.svg"
      - "assets/fog_flour_logo.png"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stage public-safe site only
        run: |
          install -d _site/assets
          install -m 0644 \
            index.html \
            404.html \
            styles.css \
            app.js \
            roadmap.json \
            favicon.svg \
            _site/
          install -m 0644 assets/fog_flour_logo.png _site/assets/fog_flour_logo.png
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
